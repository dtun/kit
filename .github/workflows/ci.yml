name: Kit CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npx biome check .
      - run: npm test

  deploy:
    name: Deploy to Cloudflare
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  smoke:
    name: Post-Deploy Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://kitkit.dev/health)
          if [ "$response" != "200" ]; then
            echo "Health check failed with status $response"
            exit 1
          fi
          echo "Health check passed"

  eval:
    name: LLM Evals
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npm run eval:ci
        env:
          # Use a dedicated Workers AI scoped token, not the wrangler
          # deploy token — least privilege.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_AI_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Dump failed eval task errors
        if: failure()
        run: |
          if [ -f node_modules/.evalite/cache.sqlite ]; then
            echo "::group::Failed eval task outputs (latest run)"
            sqlite3 node_modules/.evalite/cache.sqlite \
              "select e.name || ' :: ' || substr(r.input, 1, 80) || ' → ' || substr(r.output, 1, 300) from results r join evals e on e.id=r.eval_id where e.run_id=(select max(id) from runs) and r.status='fail' limit 20;" \
              || true
            echo "::endgroup::"
          else
            echo "No evalite cache.sqlite found at node_modules/.evalite/"
          fi
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: node_modules/.evalite/
          include-hidden-files: true
          if-no-files-found: warn
